<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vessel — Connection Error</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #313338;
      color: #dbdee1;
      font-family: 'gg sans', 'Noto Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 16px;
      padding: 24px;
      text-align: center;
    }

    svg { opacity: 0.4; }

    h1 {
      font-size: 24px;
      font-weight: 700;
      color: #f2f3f5;
    }

    p {
      font-size: 16px;
      color: #949ba4;
      max-width: 420px;
      line-height: 1.5;
    }

    button {
      margin-top: 8px;
      padding: 12px 32px;
      background: #5865f2;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 120ms ease;
    }

    button:hover { background: #4752c4; }
    button:active { background: #3c45a5; }
  </style>
</head>
<body>
  <!-- Discord's "wumpus looking sad" stand-in -->
  <svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="60" cy="60" r="50" fill="#5865f2" opacity="0.2"/>
    <ellipse cx="44" cy="52" rx="8" ry="10" fill="#dbdee1"/>
    <ellipse cx="76" cy="52" rx="8" ry="10" fill="#dbdee1"/>
    <circle cx="44" cy="54" r="4" fill="#313338"/>
    <circle cx="76" cy="54" r="4" fill="#313338"/>
    <path d="M44 78 Q60 70 76 78" stroke="#dbdee1" stroke-width="3" stroke-linecap="round" fill="none"/>
  </svg>

  <h1>Can't reach Discord</h1>
  <p>Check your internet connection and try again. If the problem persists, Discord may be experiencing an outage.</p>
  <button onclick="window.location.href='https://discord.com/app'">Try Again</button>
</body>
</html>
